# docker-compose.yml
# Runs the full stack locally: backend + frontend.
# Redis removed — weather cache is now SQLite (file-based, zero infrastructure).

version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      - WEATHER_CACHE_TTL_SECONDS=${WEATHER_CACHE_TTL_SECONDS:-1800}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-weather_cache.db}
    volumes:
      - ./backend:/app    # Hot-reload: code changes are reflected immediately
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules   # Don't overwrite node_modules with the host mount
    command: npm run dev -- --host