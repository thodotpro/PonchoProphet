<!-- frontend/index.html -->
<!-- Vite's entry point. The <div id="app"> is where Vue mounts.
     This file lives in the frontend/ root, NOT inside src/. -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poncho Prophet</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Vite injects the compiled JS bundle here at build time -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
